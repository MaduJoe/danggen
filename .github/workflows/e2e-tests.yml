name: E2E 테스트 자동화

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 매일 오전 9시 (KST)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  ANDROID_API_LEVEL: 29
  ANDROID_TARGET: google_apis
  ANDROID_ARCH: x86_64
  ANDROID_AVD_NAME: test_avd
  APPIUM_PORT: 4723

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        api-level: [28, 29, 30]
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        
      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Java 환경 설정 (Android SDK 용)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Node.js 환경 설정 (Appium 용)
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Android SDK 설정
        uses: android-actions/setup-android@v3
        
      - name: AVD 캐시
        uses: actions/cache@v3
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}
          
      - name: Android 에뮬레이터 생성
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ env.ANDROID_TARGET }}
          arch: ${{ env.ANDROID_ARCH }}
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD 생성 완료"
          
      - name: Python 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest pytest-xdist
          
      - name: Appium 설치
        run: |
          npm install -g appium@next
          npm install -g @appium/driver-utils
          appium driver install uiautomator2
          appium driver list
          
      - name: E2E 테스트 실행
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ env.ANDROID_TARGET }}
          arch: ${{ env.ANDROID_ARCH }}
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "Appium 서버 시작"
            appium &
            sleep 10
            
            echo "에뮬레이터 준비 대기"
            adb wait-for-device
            adb shell input keyevent 82
            
            echo "테스트 환경 설정"
            export APPIUM_SERVER_URL="http://localhost:${{ env.APPIUM_PORT }}/wd/hub"
            export ANDROID_DEVICE_NAME="${{ env.ANDROID_AVD_NAME }}"
            export ANDROID_PLATFORM_VERSION="${{ matrix.api-level }}"
            
            echo "E2E 테스트 실행"
            mkdir -p reports/allure-results
            pytest tests/ \
              --alluredir=reports/allure-results \
              --junitxml=reports/junit-results-api-${{ matrix.api-level }}.xml \
              -v \
              -x \
              --tb=short \
              --capture=no
              
      - name: 테스트 실패 시 로그 수집
        if: failure()
        run: |
          echo "=== 에뮬레이터 로그 ==="
          adb logcat -d > reports/emulator-api-${{ matrix.api-level }}.log || true
          
          echo "=== Appium 로그 ==="
          ps aux | grep appium || true
          
          echo "=== 시스템 정보 ==="
          uname -a
          free -h
          df -h
          
      - name: 스크린샷 수집
        if: always()
        run: |
          mkdir -p reports/screenshots
          find . -name "*.png" -path "./screenshots/*" -exec cp {} reports/screenshots/ \; || true
          ls -la reports/screenshots/ || true
          
      - name: Allure 리포트 생성
        if: always()
        run: |
          # Allure 설치
          wget -q https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
          tar -xzf allure-2.24.1.tgz
          
          # 리포트 생성
          ./allure-2.24.1/bin/allure generate reports/allure-results -o reports/allure-report --clean
          
          # 리포트 파일 목록 확인
          ls -la reports/allure-report/
          
      - name: 테스트 결과 업로드
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-api-${{ matrix.api-level }}
          path: |
            reports/
            screenshots/
          retention-days: 30
          
      - name: JUnit 테스트 결과 게시
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E 테스트 결과 (API ${{ matrix.api-level }})
          path: reports/junit-results-api-${{ matrix.api-level }}.xml
          reporter: java-junit
          fail-on-error: false

  deploy-report:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        
      - name: 모든 테스트 결과 다운로드
        uses: actions/download-artifact@v3
        with:
          path: all-results
          
      - name: 통합 Allure 리포트 생성
        run: |
          # Allure 설치
          wget -q https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
          tar -xzf allure-2.24.1.tgz
          
          # 모든 allure-results 통합
          mkdir -p merged-results
          find all-results -name "allure-results" -type d -exec cp -r {}/* merged-results/ \; 2>/dev/null || true
          
          # 통합 리포트 생성
          ./allure-2.24.1/bin/allure generate merged-results -o final-report --clean
          
          # 리포트에 추가 정보 삽입
          echo "<h2>테스트 실행 정보</h2>" >> final-report/index.html
          echo "<p>실행 시간: $(date)</p>" >> final-report/index.html
          echo "<p>Git 커밋: ${{ github.sha }}</p>" >> final-report/index.html
          echo "<p>브랜치: ${{ github.ref_name }}</p>" >> final-report/index.html
          
      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-report
          destination_dir: test-reports
          
      - name: 배포 결과 출력
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🎉 Allure 리포트가 GitHub Pages에 배포되었습니다!"
          echo "📊 리포트 URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/test-reports/"
          echo "📅 배포 시간: $(date)"
          
  notify:
    runs-on: ubuntu-latest
    needs: [e2e-tests, deploy-report]
    if: always()
    
    steps:
      - name: 테스트 결과 요약
        run: |
          echo "🔍 E2E 테스트 실행 완료"
          echo "📋 작업 결과:"
          echo "  - E2E 테스트: ${{ needs.e2e-tests.result }}"
          echo "  - 리포트 배포: ${{ needs.deploy-report.result }}"
          echo "💾 브랜치: ${{ github.ref_name }}"
          echo "🔗 커밋: ${{ github.sha }}"
          
          if [[ "${{ needs.e2e-tests.result }}" == "failure" ]]; then
            echo "❌ 일부 테스트가 실패했습니다. 리포트를 확인해주세요."
            exit 1
          else
            echo "✅ 모든 테스트가 성공했습니다!"
          fi
