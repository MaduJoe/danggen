[tool:pytest]
# 테스트 수집 경로
testpaths = tests

# 테스트 파일 패턴
python_files = test_*.py *_test.py

# 테스트 클래스 패턴
python_classes = Test*

# 테스트 함수 패턴
python_functions = test_*

# 기본 옵션
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --alluredir=reports/allure-results
    --html=reports/pytest_report.html
    --self-contained-html
    --capture=tee-sys

# 로그 설정
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 파일 로깅
log_file = reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s (%(filename)s:%(lineno)d)
log_file_date_format = %Y-%m-%d %H:%M:%S

# 커스텀 마커 정의
markers =
    api: API 테스트 마커
    mobile: 모바일 UI 테스트 마커
    e2e: End-to-End 테스트 마커
    smoke: 스모크 테스트 마커
    regression: 회귀 테스트 마커
    location: 위치 기반 테스트 마커 (예: @pytest.mark.location('Yongsan'))
    slow: 실행 시간이 긴 테스트 마커
    integration: 통합 테스트 마커
    unit: 단위 테스트 마커

# 경고 필터
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
